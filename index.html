<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Utopico Ops</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Utopico">
<meta name="theme-color" content="#1C1B1B">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1C1B1B;--bg2:#252424;--bg3:#2e2d2d;--border:#3a3939;--text:#ffffff;--text2:#aaaaaa;--text3:#555;--green:#7ec850;--amber:#f0a030;--red:#e24b4a;--radius:10px;--font:'Helvetica Neue',Arial,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}

/* LOGIN */
.screen{display:none}.screen.active{display:block}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;gap:2rem}
.logo{font-size:22px;font-weight:500;letter-spacing:2px}
.logo-sub{font-size:13px;color:var(--text2);letter-spacing:1px;margin-top:4px;text-align:center}
.pin-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:320px;text-align:center}
.pin-title{font-size:15px;font-weight:500;margin-bottom:.5rem}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
.pin-display{font-size:28px;letter-spacing:8px;font-weight:500;min-height:42px;margin-bottom:1.5rem;color:var(--text)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-btn{background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:14px;font-size:18px;font-weight:500;cursor:pointer;color:var(--text);font-family:var(--font)}
.pin-btn:hover{background:#3a3939}
.pin-btn:active{transform:scale(.96)}
.pin-btn.wide{grid-column:span 2}
.pin-error{font-size:13px;color:var(--red);margin-top:1rem;min-height:18px}

/* SHELL */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 1.5rem;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem}
.topbar-brand{font-size:16px;font-weight:500;letter-spacing:1px}
.topbar-role{font-size:12px;color:var(--text2)}
.btn-sm{font-size:12px;color:var(--text2);background:none;border:0.5px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:var(--font)}
.btn-sm:hover{border-color:#fff;color:#fff}
.nav{display:flex;gap:4px;margin-bottom:1.5rem;flex-wrap:wrap}
.nav-btn{font-size:13px;padding:6px 14px;border-radius:20px;border:0.5px solid transparent;cursor:pointer;background:none;color:var(--text2);font-family:var(--font)}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:#fff;color:#1C1B1B}
.section{display:none}.section.active{display:block}
.section-title{font-size:18px;font-weight:500;margin-bottom:1.25rem}

/* CARDS */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500;margin-bottom:1rem}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:var(--bg3);border-radius:8px;padding:1rem}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500}
.stat-delta{font-size:11px;color:var(--text2);margin-top:2px}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab-btn{font-size:13px;padding:5px 14px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;background:none;font-family:var(--font);color:var(--text2)}
.tab-btn.active{background:#fff;color:#1C1B1B;border-color:#fff}
.tab-panel{display:none}.tab-panel.active{display:block}

/* CHECKLIST */
.check-progress{font-size:12px;color:var(--text2);margin-bottom:1rem}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--text3);flex-shrink:0;transition:all .15s}
.check-box.done{background:#fff;border-color:#fff;display:flex;align-items:center;justify-content:center}
.check-box.done::after{content:'';display:block;width:5px;height:9px;border:2px solid #1C1B1B;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.check-text{font-size:14px}.check-text.done{color:var(--text3);text-decoration:line-through}

/* INVENTORY */
.inv-cat{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin:1.25rem 0 .75rem;padding-bottom:4px;border-bottom:0.5px solid var(--border)}
.inv-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.inv-row:last-child{border-bottom:none}
.inv-name{flex:1;font-size:14px}
.inv-unit{font-size:12px;color:var(--text2);min-width:36px;text-align:right}
.inv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.inv-dot.ok{background:var(--green)}.inv-dot.low{background:var(--amber)}.inv-dot.out{background:var(--red)}
.inv-controls{display:flex;align-items:center;gap:6px}
.inv-qty-btn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border);background:none;cursor:pointer;font-size:16px;color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center}
.inv-qty-btn:hover{background:var(--bg3)}
.inv-qty-val{font-size:14px;font-weight:500;min-width:28px;text-align:center}

/* ALERT BANNER */
.alert-banner{border-radius:8px;padding:.75rem 1rem;font-size:13px;margin-bottom:1rem;display:none}
.alert-banner.show{display:block}
.alert-amber{background:#3a2800;border:0.5px solid #7a5200;color:#f0a030}
.alert-green{background:#1a3300;border:0.5px solid #4a8020;color:#7ec850}

/* FORMS */
.form-row{margin-bottom:1rem}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.form-input{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);background:var(--bg3);color:var(--text)}
.form-input:focus{outline:none;border-color:#fff}
textarea.form-input{resize:vertical;min-height:72px}
select.form-input{cursor:pointer}
.btn-primary{background:#fff;color:#1C1B1B;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-family:var(--font);cursor:pointer;font-weight:500}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

/* STARS */
.stars{display:flex;gap:4px}
.star{font-size:22px;cursor:pointer;color:var(--text3)}.star.on{color:#fff}

/* PROTOCOLS */
.proto-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px}
.proto-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer}
.proto-name{font-size:14px;font-weight:500}
.proto-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--text2)}
.proto-arrow{font-size:12px;color:var(--text2);transition:transform .2s}
.proto-arrow.open{transform:rotate(180deg)}
.proto-body{display:none;padding:0 16px 16px;border-top:0.5px solid var(--border)}
.proto-body.open{display:block}
.proto-step{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.proto-step:last-child{border-bottom:none}
.proto-num{min-width:20px;height:20px;border-radius:50%;background:#fff;color:#1C1B1B;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}

/* SCHEDULE */
.sched-table{width:100%;border-collapse:collapse;font-size:13px}
.sched-table th{padding:8px 6px;text-align:left;font-weight:500;font-size:11px;color:var(--text2);border-bottom:0.5px solid var(--border)}
.sched-table td{padding:8px 6px;border-bottom:0.5px solid var(--border)}
.shift-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;background:var(--bg3);color:var(--text)}
.shift-off{color:var(--text3)}

/* NOTICES */
.notice{background:var(--bg2);border-left:3px solid #fff;border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin-bottom:.75rem}
.notice-from{font-size:11px;color:var(--text2);margin-bottom:4px}
.notice-text{font-size:14px;line-height:1.6}
.notice-date{font-size:11px;color:var(--text3);margin-top:4px}

/* VACATIONS */
.vac-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);flex-wrap:wrap}
.vac-row:last-child{border-bottom:none}
.vac-name{font-weight:500;font-size:14px;min-width:100px}
.vac-dates{font-size:13px;color:var(--text2);flex:1}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500}
.badge-pending{background:#3a2800;color:#f0a030}
.badge-ok{background:#1a3300;color:#7ec850}
.badge-no{background:#3a0000;color:#e24b4a}
.vac-actions{display:flex;gap:6px}
.btn-vac{padding:3px 10px;border-radius:6px;border:0.5px solid var(--border);font-size:12px;cursor:pointer;background:none;font-family:var(--font);color:var(--text)}
.btn-vac.approve{border-color:#7ec850;color:#7ec850}
.btn-vac.deny{border-color:#e24b4a;color:#e24b4a}

/* ALERT ROWS */
.alert-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.alert-row:last-child{border-bottom:none}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-banner{border-radius:8px;padding:.625rem .875rem;font-size:12px;border:0.5px solid;margin-top:.875rem;display:none}
.alert-banner.show{display:block}
.alert-banner.alert-green{background:#1a3300;border-color:#7ec850;color:#7ec850}
.alert-banner.alert-amber{background:#3a2800;border-color:#f0a030;color:#f0a030}
.alert-banner.alert-red{background:#3a0000;border-color:var(--red);color:var(--red)}

/* LOADING */
.loading{text-align:center;padding:2rem;color:var(--text2);font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}.sched-table{font-size:11px}.sched-table td,.sched-table th{padding:6px 4px}}
</style>
</head>
<body>
<div class="app">

<!-- USER SELECTION SCREEN -->
<div class="screen active" id="screen-users">
  <div class="login-wrap">
    <div><div class="logo" style="text-align:center">UTOPICO</div><div class="logo-sub" style="text-align:center">UTOPIA IS A STATE OF MIND</div></div>
    <div style="font-size:12px;color:var(--text2);text-align:center">¿Quién eres?</div>
    <div id="user-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:480px">
      <div class="loading"><span class="spinner"></span></div>
    </div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div class="screen" id="screen-login">
  <div class="login-wrap">
    <div><div class="logo" style="text-align:center">UTOPICO</div><div class="logo-sub" style="text-align:center">UTOPIA IS A STATE OF MIND</div></div>
    <div class="pin-card">
      <div class="pin-title" id="pin-username">Introduce tu PIN</div>
      <div class="pin-sub">4 dígitos</div>
      <div class="pin-display" id="pin-display">––––</div>
      <div class="pin-grid">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn" onclick="pinClear()">✕</button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn" onclick="pinBack()">⌫</button>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <div style="margin-top:1rem;font-size:12px;color:var(--text2);cursor:pointer" onclick="backToUsers()">← Volver</div>
    </div>
  </div>
</div>

<!-- LOCAL SELECTION SCREEN -->
<div class="screen" id="screen-local">
  <div class="login-wrap">
    <div><div class="logo" style="text-align:center">UTOPICO</div><div class="logo-sub" style="text-align:center">UTOPIA IS A STATE OF MIND</div></div>
    <div style="font-size:14px;color:var(--text2);text-align:center" id="local-select-name"></div>
    <div style="font-size:13px;color:var(--text2);text-align:center">¿En qué local trabajas hoy?</div>
    <div style="display:flex;gap:12px;width:100%;max-width:360px">
      <div class="pin-card" style="cursor:pointer;flex:1" onclick="selectLocal('juan_bravo')">
        <div style="font-size:22px;margin-bottom:8px">☕</div>
        <div style="font-size:14px;font-weight:500">Juan Bravo</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">Juan Bravo 27</div>
      </div>
      <div class="pin-card" style="cursor:pointer;flex:1" onclick="selectLocal('matbakh')">
        <div style="font-size:22px;margin-bottom:8px">🍽</div>
        <div style="font-size:14px;font-weight:500">Matbakh</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">Don Ramón 48</div>
      </div>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div class="screen" id="screen-app">
  <div class="topbar">
    <div><div class="topbar-brand">UTOPICO</div><div class="topbar-role" id="app-role-label"></div></div>
    <button class="btn-sm" onclick="logout()">Salir</button>
  </div>
  <div class="nav" id="app-nav"></div>
  <div id="app-sections"></div>
</div>

</div>

<script>
const SUPABASE_URL = 'https://ombypthpxggwqxqptkng.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8CGNBEnrFLv041HyhSuqWw_Q2BX5r-v';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let pinInput = '';
let invCache = {};
let selectedUser = null;

// ── LOAD USERS ────────────────────────────────────────────────
async function loadUsers() {
  const { data: users } = await sb.from('ops_users').select('*').eq('active', true).order('name');
  const grid = document.getElementById('user-grid');
  if (!users || !users.length) { grid.innerHTML = '<p style="color:var(--text2);font-size:13px">Sin usuarios.</p>'; return; }
  const roleLabel = { owner: 'Propietario', manager: 'Encargado', barista: 'Barista' };
  const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const colors = ['#fff','#1a2a3a','#1a2e26','#2e2200','#2e1a22','#2a1a2e'];
  const textColors = ['#1C1B1B','#7ab4e0','#5ec4a0','#c8920a','#c47090','#a090c0'];
  grid.innerHTML = users.map((u,i) => `
    <div class="pin-card" style="cursor:pointer;padding:1.25rem .75rem" onclick='pickUser(${JSON.stringify(u).replace(/"/g,'&quot;')})'>
      <div style="width:36px;height:36px;border-radius:50%;background:${colors[i%colors.length]};color:${textColors[i%textColors.length]};display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:13px;font-weight:500">${initials(u.name)}</div>
      <div style="font-size:13px;font-weight:500;color:var(--text)">${u.name}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">${roleLabel[u.role]}</div>
    </div>`).join('');
}

function pickUser(user) {
  selectedUser = user;
  pinInput = '';
  renderPinDisplay();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-username').textContent = `Hola, ${user.name}`;
  document.getElementById('screen-users').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
}

function backToUsers() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-users').classList.add('active');
  pinInput = '';
  renderPinDisplay();
}

// ── PIN ──────────────────────────────────────────────────────
function pinPress(d) {
  if (pinInput.length >= 4) return;
  pinInput += d;
  renderPinDisplay();
  if (pinInput.length === 4) setTimeout(tryLogin, 150);
}
function pinBack() { pinInput = pinInput.slice(0,-1); renderPinDisplay(); }
function pinClear() { pinInput = ''; renderPinDisplay(); document.getElementById('pin-error').textContent = ''; }
function renderPinDisplay() {
  const d = document.getElementById('pin-display');
  if (d) d.textContent = '●'.repeat(pinInput.length) + '–'.repeat(4 - pinInput.length);
}

async function tryLogin() {
  if (!selectedUser) return;
  if (pinInput !== selectedUser.pin) {
    document.getElementById('pin-error').textContent = 'PIN incorrecto';
    pinInput = '';
    renderPinDisplay();
    return;
  }
  currentUser = { ...selectedUser };
  pinInput = '';
  renderPinDisplay();
  document.getElementById('pin-error').textContent = '';
  if (currentUser.local === 'all' && currentUser.role !== 'owner') {
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('local-select-name').textContent = `Hola ${currentUser.name}`;
    document.getElementById('screen-local').classList.add('active');
  } else {
    showApp();
  }
}

function selectLocal(local) {
  currentUser.local = local;
  document.getElementById('screen-local').classList.remove('active');
  showApp();
}

function logout() {
  currentUser = null;
  selectedUser = null;
  invCache = {};
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-local').classList.remove('active');
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-users').classList.add('active');
}

loadUsers();

// ── APP SHELL ─────────────────────────────────────────────────
function showApp() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('app-role-label').textContent =
    `${currentUser.name} · ${currentUser.role === 'owner' ? 'Propietario' : currentUser.role === 'manager' ? localLabel(currentUser.local) : 'Barista · ' + localLabel(currentUser.local)}`;
  buildNav();
}
function localLabel(l) { return l === 'juan_bravo' ? 'Juan Bravo' : l === 'matbakh' ? 'Matbakh' : 'Todos los locales'; }

function buildNav() {
  const nav = document.getElementById('app-nav');
  const role = currentUser.role;
  let tabs = [];
  if (role === 'owner') tabs = ['Resumen','Inventario','Horarios','Vacaciones','Avisos','Protocolos'];
  else if (role === 'manager') tabs = ['Checklist','Inventario','Parte diario','Café','Horarios','Protocolos','Avisos'];
  else tabs = ['Mi turno','Protocolos','Avisos','Vacaciones'];
  nav.innerHTML = tabs.map((t,i) =>
    `<button class="nav-btn${i===0?' active':''}" onclick="showSection('${t}',this)">${t}</button>`
  ).join('');
  showSectionByName(tabs[0]);
}

function showSection(name, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  showSectionByName(name);
}

function showSectionByName(name) {
  const container = document.getElementById('app-sections');
  container.innerHTML = `<div class="loading"><span class="spinner"></span>Cargando...</div>`;
  const role = currentUser.role;
  if (name === 'Resumen') renderOwnerOverview();
  else if (name === 'Inventario') renderInventory();
  else if (name === 'Checklist') renderChecklist();
  else if (name === 'Parte diario') renderDailyReport();
  else if (name === 'Café') renderCoffeeQuality();
  else if (name === 'Protocolos') renderProtocols();
  else if (name === 'Avisos') renderNotices();
  else if (name === 'Horarios') renderSchedule();
  else if (name === 'Vacaciones' || name === 'Mi turno' && false) renderVacations();
  else if (name === 'Mi turno') renderMySchedule();
}

// ── OWNER OVERVIEW ────────────────────────────────────────────
async function renderOwnerOverview() {
  const c = document.getElementById('app-sections');
  const today = new Date().toISOString().split('T')[0];
  const [repRes, invRes] = await Promise.all([
    sb.from('ops_daily_reports').select('*').eq('report_date', today).order('created_at', { ascending: false }),
    sb.from('ops_inventory').select('*').lt('quantity', sb.raw ? undefined : 0)
  ]);
  const reports = repRes.data || [];
  const jbRep = reports.find(r => r.local === 'juan_bravo');
  const mbRep = reports.find(r => r.local === 'matbakh');
  const { data: invAll } = await sb.from('ops_inventory').select('*');
  const lowItems = (invAll || []).filter(i => i.quantity < i.min_quantity);

  c.innerHTML = `
    <div class="section-title">Resumen del día</div>
    <div class="tabs">

function ownerLocalCard(rep, local, lowItems) {

  `;
  const cashOk = rep.cash_matches;
  return `
    <div class="stats-grid">

      <div class="stat"><div class="stat-label">Encargado</div><div class="stat-val" style="font-size:15px">${rep.submitted_by}</div></div>
      <div class="stat"><div class="stat-label">Stock bajo</div><div class="stat-val" style="color:${localLow.length?'var(--amber)':'var(--green)'}">${localLow.length}</div></div>
    </div>
    ${rep.manager_note ? `<div class="card"><div class="card-title">Nota del encargado</div><div style="font-size:14px;line-height:1.6">${rep.manager_note}</div><div style="font-size:11px;color:var(--text3);margin-top:8px">${rep.submitted_by} · Hoy</div></div>` : ''}
    ${rep.incidents ? `<div class="card"><div class="card-title">Incidencias</div><div style="font-size:14px;line-height:1.6;color:var(--amber)">${rep.incidents}</div></div>` : ''}
    ${localLow.length ? `<div class="card"><div class="card-title">Stock bajo</div>${localLow.map(i=>`<div class="alert-row"><div class="alert-dot" style="background:var(--amber)"></div><span>${i.name} — ${i.quantity} ${i.unit} (mín. ${i.min_quantity})</span></div>`).join('')}</div>` : ''}

// ── INVENTORY ─────────────────────────────────────────────────
async function renderInventory() {
  const c = document.getElementById('app-sections');
  const isOwner = currentUser.role === 'owner';
  const isManager = currentUser.role === 'manager';
  const editable = isManager;
  let locals = isOwner ? ['juan_bravo','matbakh'] : [currentUser.local];

  const { data: items } = await sb.from('ops_inventory').select('*').order('category').order('name');
  invCache = {};
  (items||[]).forEach(i => { invCache[i.id] = i; });

  const lowCount = (items||[]).filter(i => i.quantity < i.min_quantity).length;

  let html = `<div class="section-title">Inventario en vivo</div>`;
  if (lowCount) html += `<div class="alert-banner alert-amber show">${lowCount} producto${lowCount>1?'s':''} bajo mínimo</div>`;

  if (isOwner) {
    html += `<div class="tabs"><button class="tab-btn active" onclick="switchTab('inv','jb',this)">Juan Bravo</button><button class="tab-btn" onclick="switchTab('inv','mb',this)">Matbakh</button></div>
    <div class="tab-panel active" id="inv-jb">${buildInvTable(items,'juan_bravo',false)}${addProductForm('juan_bravo')}</div>
    <div class="tab-panel" id="inv-mb">${buildInvTable(items,'matbakh',false)}${addProductForm('matbakh')}</div>`;
  } else {
    html += buildInvTable(items, currentUser.local, editable);
    html += addProductForm(currentUser.local);
  }
  c.innerHTML = html;
}

function addProductForm(local) {
  const cats = local === 'matbakh'
    ? ['cafe','leches','consumibles','limpieza','bakery','congelados','bebidas','verdura','carnes']
    : ['cafe','leches','consumibles','limpieza'];
  const catLabels = {cafe:'Café',leches:'Leches',consumibles:'Consumibles',limpieza:'Limpieza',bakery:'Bakery',congelados:'Congelados',bebidas:'Bebidas',verdura:'Verdura y fruta',carnes:'Carnes'};
  return `<div class="card" style="margin-top:.875rem">
    <div class="card-title">Añadir producto</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div><label class="form-label">Nombre</label><input class="form-input" id="np-name-${local}" placeholder="Ej: Leche coco"></div>
      <div><label class="form-label">Categoría</label><select class="form-input" id="np-cat-${local}">${cats.map(c=>`<option value="${c}">${catLabels[c]}</option>`).join('')}</select></div>
      <div><label class="form-label">Cantidad inicial</label><input type="number" class="form-input" id="np-qty-${local}" placeholder="0" min="0"></div>
      <div><label class="form-label">Cantidad mínima</label><input type="number" class="form-input" id="np-min-${local}" placeholder="0" min="0"></div>
      <div><label class="form-label">Unidad</label><input class="form-input" id="np-unit-${local}" placeholder="ud / kg / L / paq..."></div>
    </div>
    <button class="btn-primary" onclick="addProduct('${local}')">Añadir producto</button>
    <div class="alert-banner alert-green" id="np-ok-${local}">Producto añadido.</div>
    <div class="alert-banner alert-red" id="np-err-${local}">Rellena todos los campos.</div>
  </div>`;
}

function buildInvTable(items, local, editable) {
  const localItems = (items||[]).filter(i => i.local === local);
  const cats = [...new Set(localItems.map(i => i.category))];
  let html = `<div class="card" style="padding:1rem 1.25rem">`;
  cats.forEach(cat => {
    html += `<div class="inv-cat">${catLabel(cat)}</div>`;
    localItems.filter(i => i.category === cat).forEach(item => {
      const qty = item.quantity;
      const st = qty <= 0 ? 'out' : qty < item.min_quantity ? 'low' : 'ok';
      const ctrl = editable
        ? `<div class="inv-controls">
            <button class="inv-qty-btn" onclick="updateQty('${item.id}',-1)">−</button>
            <span class="inv-qty-val" id="qty-${item.id}">${qty}</span>
            <button class="inv-qty-btn" onclick="updateQty('${item.id}',1)">+</button>
            <button style="font-size:11px;padding:2px 7px;border-radius:5px;border:0.5px solid var(--border);background:none;color:var(--text2);cursor:pointer;margin-left:4px" onclick="editProduct('${item.id}')">✎</button>
            <button style="font-size:11px;padding:2px 7px;border-radius:5px;border:0.5px solid var(--red);background:none;color:var(--red);cursor:pointer" onclick="deleteProduct('${item.id}')">✕</button>
           </div>`
        : `<span class="inv-qty-val">${qty}</span>`;
      html += `<div class="inv-row" id="invrow-${item.id}"><div class="inv-dot ${st}"></div><div class="inv-name">${item.name}<br><span style="font-size:10px;color:var(--text3)">mín. ${item.min_quantity} ${item.unit}</span></div><div class="inv-unit">${item.unit}</div>${ctrl}</div>`;
    });
  });
  return html + '</div>';
}

function catLabel(c) {
  return {cafe:'Café',leches:'Leches',consumibles:'Consumibles',limpieza:'Limpieza',comida:'Comida / Cocina',bakery:'Bakery',congelados:'Congelados',bebidas:'Bebidas',verdura:'Verdura y fruta',carnes:'Carnes'}[c] || c;
}

async function addProduct(local) {
  const name = document.getElementById(`np-name-${local}`).value.trim();
  const cat = document.getElementById(`np-cat-${local}`).value;
  const qty = parseFloat(document.getElementById(`np-qty-${local}`).value) || 0;
  const min = parseFloat(document.getElementById(`np-min-${local}`).value) || 0;
  const unit = document.getElementById(`np-unit-${local}`).value.trim();
  const errEl = document.getElementById(`np-err-${local}`);
  const okEl = document.getElementById(`np-ok-${local}`);
  if (!name || !unit) { errEl.classList.add('show'); setTimeout(() => errEl.classList.remove('show'), 2500); return; }
  await sb.from('ops_inventory').insert({ local, category: cat, name, quantity: qty, min_quantity: min, unit, updated_by: currentUser.name });
  okEl.classList.add('show');
  ['np-name','np-qty','np-min','np-unit'].forEach(id => { document.getElementById(`${id}-${local}`).value = ''; });
  setTimeout(() => { okEl.classList.remove('show'); renderInventory(); }, 1500);
}

async function deleteProduct(id) {
  if (!confirm('¿Borrar este producto del inventario?')) return;
  await sb.from('ops_inventory').delete().eq('id', id);
  renderInventory();
}

async function editProduct(id) {
  const item = invCache[id];
  if (!item) return;
  const newName = prompt('Nombre del producto:', item.name);
  if (newName === null) return;
  const newMin = prompt('Cantidad mínima:', item.min_quantity);
  if (newMin === null) return;
  const newUnit = prompt('Unidad (ud/kg/L/paq...):', item.unit);
  if (newUnit === null) return;
  await sb.from('ops_inventory').update({ name: newName, min_quantity: parseFloat(newMin)||0, unit: newUnit, updated_by: currentUser.name }).eq('id', id);
  renderInventory();
}

async function updateQty(id, delta) {
  const item = invCache[id];
  if (!item) return;
  const newQty = Math.max(0, item.quantity + delta);
  invCache[id].quantity = newQty;
  const el = document.getElementById(`qty-${id}`);
  if (el) el.textContent = newQty;
  const dot = el?.closest('.inv-row')?.querySelector('.inv-dot');
  if (dot) {
    dot.className = 'inv-dot ' + (newQty <= 0 ? 'out' : newQty < item.min_quantity ? 'low' : 'ok');
  }
  await sb.from('ops_inventory').update({ quantity: newQty, updated_at: new Date().toISOString(), updated_by: currentUser.name }).eq('id', id);
}

async function renderChecklist() {
  const c = document.getElementById('app-sections');
  const today = new Date().toISOString().split('T')[0];
  const local = currentUser.local;
  const { data: existing } = await sb.from('ops_checklists').select('*').eq('local', local).eq('check_date', today);
  const openRec = existing?.find(r => r.type === 'opening');
  const closeRec = existing?.find(r => r.type === 'closing');

  const openSteps = local === 'juan_bravo' ? STEPS_OPEN_JB : STEPS_OPEN_MB;
  const closeSteps = local === 'juan_bravo' ? STEPS_CLOSE_JB : STEPS_CLOSE_MB;

  c.innerHTML = `
    <div class="section-title">Checklist del día</div>
    <div class="card"><div class="card-title">Apertura · ${localLabel(local)}</div><div id="cl-open">${buildChecklistHTML(openSteps, openRec?.completed_steps||[], 'open')}</div></div>
    <div class="card"><div class="card-title">Cierre · ${localLabel(local)}</div><div id="cl-close">${buildChecklistHTML(closeSteps, closeRec?.completed_steps||[], 'close')}</div></div>
  `;
}

function buildChecklistHTML(steps, completed, type) {
  const done = completed.length;
  return `<div class="check-progress" id="cl-prog-${type}">${done}/${steps.length} completados</div>` +
    steps.map((s,i) => {
      const isDone = completed.includes(i);
      return `<div class="check-item" onclick="toggleChecklistItem(${i},'${type}')"><div class="check-box${isDone?' done':''}" id="cb-${type}-${i}"></div><div class="check-text${isDone?' done':''}" id="ct-${type}-${i}">${s}</div></div>`;
    }).join('');
}

const clState = { open: [], close: [] };

async function toggleChecklistItem(idx, type) {
  const today = new Date().toISOString().split('T')[0];
  const local = currentUser.local;
  const { data: existing } = await sb.from('ops_checklists').select('*').eq('local', local).eq('check_date', today).eq('type', type === 'open' ? 'opening' : 'closing');
  const rec = existing?.[0];
  const steps = type === 'open' ? (local === 'juan_bravo' ? STEPS_OPEN_JB : STEPS_OPEN_MB) : (local === 'juan_bravo' ? STEPS_CLOSE_JB : STEPS_CLOSE_MB);
  let completed = rec?.completed_steps || [];
  if (completed.includes(idx)) completed = completed.filter(i => i !== idx);
  else completed = [...completed, idx];

  const box = document.getElementById(`cb-${type}-${idx}`);
  const txt = document.getElementById(`ct-${type}-${idx}`);
  const isDone = completed.includes(idx);
  box?.classList.toggle('done', isDone);
  txt?.classList.toggle('done', isDone);
  const prog = document.getElementById(`cl-prog-${type}`);
  if (prog) prog.textContent = `${completed.length}/${steps.length} completados`;

  const payload = { local, type: type === 'open' ? 'opening' : 'closing', submitted_by: currentUser.name, check_date: today, completed_steps: completed, total_steps: steps.length };
  if (rec) await sb.from('ops_checklists').update(payload).eq('id', rec.id);
  else await sb.from('ops_checklists').insert(payload);
}

async function renderSchedule() {
  const c = document.getElementById('app-sections');
  const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  const dayLabels = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const isOwner = currentUser.role === 'owner';
  const isManager = currentUser.role === 'manager';
  const canEdit = isOwner || isManager;
  const local = currentUser.local;

  const { data: schedules } = await sb.from('ops_schedules').select('*').order('week_start', { ascending: false }).limit(30);
  const { data: vacs } = await sb.from('ops_vacations').select('*').eq('status','approved').order('start_date');

  function vacsForLocal(loc) {
    const v = (vacs||[]).filter(x => x.local === loc);
    if (!v.length) return `<p style="font-size:13px;color:var(--text2)">Sin vacaciones aprobadas próximamente.</p>`;
    return v.map(x=>`<div class="vac-row"><div class="vac-name">${x.employee_name}</div><div class="vac-dates">${x.start_date} → ${x.end_date}</div><span class="badge badge-ok">Aprobada</span></div>`).join('');
  }

  function schedTable(loc) {
    const rows = (schedules||[]).filter(s => s.local === loc);
    if (!rows.length) return `<p style="font-size:14px;color:var(--text2);padding:1rem 0">Sin horarios registrados todavía.</p>`;
    const week = rows[0].week_start;
    const weekRows = rows.filter(r => r.week_start === week);
    const editBtns = canEdit && (isOwner || loc === local);
    return `<p style="font-size:12px;color:var(--text2);margin-bottom:1rem">Semana del ${new Date(week+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long'})}</p>
    <div style="overflow-x:auto"><table class="sched-table"><thead><tr><th>Empleado</th>${dayLabels.map(d=>`<th>${d}</th>`).join('')}${editBtns?'<th></th>':''}</tr></thead><tbody>
    ${weekRows.map(r=>`<tr>
      <td style="font-weight:500">${r.employee_name}</td>
      ${days.map(d=>`<td>${r[d]?`<span class="shift-pill">${r[d]}</span>`:`<span class="shift-off">—</span>`}</td>`).join('')}
      ${editBtns?`<td><button style="font-size:11px;padding:2px 8px;border-radius:5px;border:0.5px solid var(--border);background:none;color:var(--text2);cursor:pointer" onclick="editShift('${r.id}','${r.employee_name}','${loc}')">Editar</button> <button style="font-size:11px;padding:2px 8px;border-radius:5px;border:0.5px solid var(--red);background:none;color:var(--red);cursor:pointer" onclick="deleteShift('${r.id}')">Borrar</button></td>`:''}
    </tr>`).join('')}
    </tbody></table></div>`;
  }

  function addForm(loc) {
    return `<div class="card" id="add-shift-card-${loc}"><div class="card-title">Añadir / editar turno</div>
      <input type="hidden" id="sch-edit-id-${loc}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div><label class="form-label">Empleado</label><input class="form-input" id="sch-name-${loc}" placeholder="Nombre completo"></div>
        <div><label class="form-label">Semana (lunes)</label><input type="date" class="form-input" id="sch-week-${loc}"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px">
        ${days.map((d,i)=>`<div><label class="form-label">${dayLabels[i]}</label><input class="form-input" id="sch-${d}-${loc}" placeholder="—" style="font-size:11px;padding:5px 6px"></div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-primary" onclick="saveShift('${loc}')">Guardar turno</button>
        <button style="background:none;border:0.5px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font)" onclick="clearShiftForm('${loc}')">Limpiar</button>
      </div>
      <div class="alert-banner alert-green" id="sch-ok-${loc}">Turno guardado.</div>
    </div>`;
  }

  let html = `<div class="section-title">Horarios</div>`;

  if (isOwner) {
    html += `<div class="tabs"><button class="tab-btn active" onclick="switchTab('sch','jb',this)">Juan Bravo</button><button class="tab-btn" onclick="switchTab('sch','mb',this)">Matbakh</button></div>
    <div class="tab-panel active" id="sch-jb">
      <div class="card">${schedTable('juan_bravo')}</div>
      ${addForm('juan_bravo')}
      <div class="card"><div class="card-title">Vacaciones aprobadas</div>${vacsForLocal('juan_bravo')}</div>
    </div>
    <div class="tab-panel" id="sch-mb">
      <div class="card">${schedTable('matbakh')}</div>
      ${addForm('matbakh')}
      <div class="card"><div class="card-title">Vacaciones aprobadas</div>${vacsForLocal('matbakh')}</div>
    </div>`;
  } else if (isManager) {
    html += `<div class="card">${schedTable(local)}</div>`;
    html += addForm(local);
    html += `<div class="card"><div class="card-title">Vacaciones del equipo</div>${vacsForLocal(local)}</div>`;
  } else {
    html += `<div class="card">${schedTable(local)}</div>`;
    html += `<div class="card"><div class="card-title">Vacaciones del equipo</div>${vacsForLocal(local)}</div>`;
    html += `<div class="card"><div class="card-title">Sugerir cambio de turno</div>
      <div class="form-row"><label class="form-label">¿Qué cambio propones?</label>
        <textarea class="form-input" id="sug-text" placeholder="Ej: el jueves 15 necesito cambiar mi turno..."></textarea>
      </div>
      <button class="btn-primary" onclick="sendSuggestion()">Enviar sugerencia</button>
      <div class="alert-banner alert-green" id="sug-ok">Sugerencia enviada.</div>
    </div>`;
  }

  c.innerHTML = html;
}

async function saveShift(loc) {
  const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  const editId = document.getElementById(`sch-edit-id-${loc}`).value;
  const payload = {
    local: loc,
    employee_name: document.getElementById(`sch-name-${loc}`).value,
    week_start: document.getElementById(`sch-week-${loc}`).value,
  };
  days.forEach(d => { payload[d] = document.getElementById(`sch-${d}-${loc}`).value || null; });
  if (!payload.employee_name || !payload.week_start) return;
  if (editId) {
    await sb.from('ops_schedules').update(payload).eq('id', editId);
  } else {
    await sb.from('ops_schedules').insert(payload);
  }
  const ok = document.getElementById(`sch-ok-${loc}`);
  ok.classList.add('show');
  setTimeout(() => { ok.classList.remove('show'); renderSchedule(); }, 1500);
}

async function deleteShift(id) {
  if (!confirm('¿Borrar este turno?')) return;
  await sb.from('ops_schedules').delete().eq('id', id);
  renderSchedule();
}

function editShift(id, name, loc) {
  const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  const { data } = sb.from('ops_schedules').select('*').eq('id', id);
  document.getElementById(`sch-edit-id-${loc}`).value = id;
  document.getElementById(`sch-name-${loc}`).value = name;
  sb.from('ops_schedules').select('*').eq('id', id).single().then(({data: r}) => {
    if (!r) return;
    document.getElementById(`sch-week-${loc}`).value = r.week_start;
    days.forEach(d => { document.getElementById(`sch-${d}-${loc}`).value = r[d] || ''; });
    document.getElementById(`add-shift-card-${loc}`).scrollIntoView({ behavior: 'smooth' });
  });
}

function clearShiftForm(loc) {
  const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  document.getElementById(`sch-edit-id-${loc}`).value = '';
  document.getElementById(`sch-name-${loc}`).value = '';
  document.getElementById(`sch-week-${loc}`).value = '';
  days.forEach(d => { document.getElementById(`sch-${d}-${loc}`).value = ''; });
}

async function sendSuggestion() {
  const txt = document.getElementById('sug-text').value.trim();
  if (!txt) return;
  await sb.from('ops_notices').insert({ author: currentUser.name, message: `Sugerencia de ${currentUser.name}: ${txt}`, target: currentUser.local });
  document.getElementById('sug-ok').classList.add('show');
  document.getElementById('sug-text').value = '';
  setTimeout(() => document.getElementById('sug-ok').classList.remove('show'), 2500);
}

// ── VACATIONS ─────────────────────────────────────────────────
async function renderVacations() {
  const c = document.getElementById('app-sections');
  const isOwner = currentUser.role === 'owner';
  const { data: vacs } = await sb.from('ops_vacations').select('*').order('created_at', { ascending: false });
  const pending = (vacs||[]).filter(v => v.status === 'pending');
  const approved = (vacs||[]).filter(v => v.status === 'approved');

  let html = `<div class="section-title">Vacaciones y ausencias</div>`;
  if (isOwner && pending.length) {
    html += `<div class="card"><div class="card-title">Solicitudes pendientes</div>
      ${pending.map(v => `<div class="vac-row" id="vac-${v.id}">
        <div class="vac-name">${v.employee_name}</div>
        <div class="vac-dates">${v.start_date} → ${v.end_date}${v.note?` · ${v.note}`:''}</div>
        <span class="badge badge-pending">Pendiente</span>
        <div class="vac-actions"><button class="btn-vac approve" onclick="reviewVac('${v.id}','approved')">Aprobar</button><button class="btn-vac deny" onclick="reviewVac('${v.id}','denied')">Denegar</button></div>
      </div>`).join('')}
    </div>`;
  }
  if (approved.length) {
    html += `<div class="card"><div class="card-title">Aprobadas</div>
      ${approved.map(v=>`<div class="vac-row"><div class="vac-name">${v.employee_name}</div><div class="vac-dates">${v.start_date} → ${v.end_date}</div><span class="badge badge-ok">Aprobada</span></div>`).join('')}
    </div>`;
  }
  html += `<div class="card"><div class="card-title">Solicitar vacaciones</div>
    <div class="form-row"><label class="form-label">Fecha de inicio</label><input type="date" class="form-input" id="vac-start"></div>
    <div class="form-row"><label class="form-label">Fecha de fin</label><input type="date" class="form-input" id="vac-end"></div>
    <div class="form-row"><label class="form-label">Nota (opcional)</label><textarea class="form-input" id="vac-note" placeholder="Motivo o comentario..."></textarea></div>
    <button class="btn-primary" onclick="submitVacation()">Enviar solicitud</button>
    <div class="alert-banner alert-green" id="vac-success">Solicitud enviada.</div>
  </div>`;
  c.innerHTML = html;
}

async function submitVacation() {
  await sb.from('ops_vacations').insert({
    employee_name: currentUser.name,
    local: currentUser.local,
    start_date: document.getElementById('vac-start').value,
    end_date: document.getElementById('vac-end').value,
    note: document.getElementById('vac-note').value,
  });
  document.getElementById('vac-success').classList.add('show');
  setTimeout(renderVacations, 1500);
}

async function reviewVac(id, status) {
  await sb.from('ops_vacations').update({ status, reviewed_by: currentUser.name, reviewed_at: new Date().toISOString() }).eq('id', id);
  renderVacations();
}

// ── MY SCHEDULE (barista) ─────────────────────────────────────
async function renderMySchedule() {
  const c = document.getElementById('app-sections');
  const { data: rows } = await sb.from('ops_schedules').select('*').eq('local', currentUser.local).eq('employee_name', currentUser.name).order('week_start', { ascending: false }).limit(1);
  const row = rows?.[0];
  const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  const dayLabels = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const { data: vacs } = await sb.from('ops_vacations').select('*').eq('local', currentUser.local).eq('status','approved').order('start_date');
  const vacsHtml = (vacs||[]).length ? (vacs||[]).map(x=>`<div class="vac-row"><div class="vac-name">${x.employee_name}</div><div class="vac-dates">${x.start_date} → ${x.end_date}</div><span class="badge badge-ok">Aprobada</span></div>`).join('') : `<p style="font-size:13px;color:var(--text2)">Sin vacaciones próximamente.</p>`;
  c.innerHTML = `<div class="section-title">Mi horario esta semana</div>
  <div class="card">${row ? `
    <p style="font-size:12px;color:var(--text2);margin-bottom:1rem">Semana del ${new Date(row.week_start+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long'})}</p>
    <table class="sched-table"><thead><tr><th>Día</th><th>Turno</th></tr></thead><tbody>
      ${days.map((d,i)=>`<tr><td>${dayLabels[i]}</td><td>${row[d]?`<span class="shift-pill">${row[d]}</span>`:`<span class="shift-off">Libre</span>`}</td></tr>`).join('')}
    </tbody></table>` : `<p style="font-size:14px;color:var(--text2)">El encargado aún no ha publicado el horario de esta semana.</p>`}
  </div>
  <div class="card"><div class="card-title">Vacaciones del equipo</div>${vacsHtml}</div>
  <div class="card"><div class="card-title">Sugerir cambio de turno</div>
    <div class="form-row"><label class="form-label">¿Qué cambio propones?</label>
      <textarea class="form-input" id="sug-text" placeholder="Ej: el jueves 15 necesito cambiar mi turno con otro barista..."></textarea>
    </div>
    <button class="btn-primary" onclick="sendSuggestion()">Enviar sugerencia</button>
    <div class="alert-banner alert-green" id="sug-ok">Sugerencia enviada.</div>
  </div>`;
}

// ── PROTOCOLS ─────────────────────────────────────────────────
function renderProtocols() {

  const local = currentUser.local || 'juan_bravo';
  const protos = local === 'matbakh' ? PROTOS_MB : PROTOS_JB;
  c.innerHTML = `<div class="section-title">Protocolos</div>
    ${protos.map((p,i) => `
    <div class="proto-item">
      <div class="proto-header" onclick="toggleProto(${i})">
        <div style="display:flex;align-items:center;gap:10px"><span class="proto-name">${p.title}</span><span class="proto-tag">${p.tag}</span></div>
        <span class="proto-arrow" id="pa-${i}">▼</span>
      </div>
      <div class="proto-body" id="pb-${i}">
        ${p.steps.map((s,si)=>`<div class="proto-step"><div class="proto-num">${si+1}</div><span>${s}</span></div>`).join('')}
      </div>
    </div>`).join('')}`;
}
function toggleProto(i) {
  document.getElementById(`pb-${i}`).classList.toggle('open');
  document.getElementById(`pa-${i}`).classList.toggle('open');
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(group, id, btn) {
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`[id^="${group}-"]`).forEach(p => p.classList.remove('active'));
  document.getElementById(`${group}-${id}`)?.classList.add('active');
}
